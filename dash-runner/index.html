<!DOCTYPE html>

<html lang="en-us"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
  
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pulse Runner</title>
  <link rel="stylesheet" href="./index_files/style.css">
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div class="title-block">
        <p class="eyebrow">Geometry Dash-inspired browser game</p>
        <h1>Pulse Runner</h1>
        <p id="status">Press Space, Up Arrow, or tap to start jumping.</p>
      </div>

      <div class="score-card" aria-label="Scoreboard">
        <div>
          <span>Score</span>
          <strong id="score">0</strong>
        </div>
        <div>
          <span>Best</span>
          <strong id="best-score">0</strong>
        </div>
      </div>
    </header>

    <main class="layout">
      <section class="stage">
        <canvas id="game" width="880" height="495" aria-label="Pulse Runner game canvas" style="width: 880px; height: 495px;"></canvas>
        <div class="overlay" id="overlay" hidden="">
          <div class="overlay-card">
            <p class="overlay-tag">Run ended</p>
            <h2>Crash detected</h2>
            <p id="final-message">You hit an obstacle.</p>
            <button id="restart" type="button">Run Again</button>
          </div>
        </div>
      </section>

      <aside class="panel">
        <button id="restart-secondary" type="button">Restart Run</button>

        <div class="control-group">
          <label for="difficulty">Speed <span id="difficulty-value">55</span>%</label>
          <input id="difficulty" type="range" min="20" max="100" value="55">
          <p>Higher speed means tighter gaps and faster scroll.</p>
        </div>

        <div class="control-group">
          <div class="hint-title">Controls</div>
          <p>Jump: Space, Up Arrow, Click, or Tap</p>
          <p>Restart: R</p>
        </div>
      </aside>
    </main>
  </div>

  <script src="./index_files/game.js"></script>

</body></html>
